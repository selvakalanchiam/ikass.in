<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hattrick Lab</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;900&display=swap');

:root { --accent: #f97316; }

body {
    font-family: 'Space Grotesk', sans-serif;
    background: #ffffff;
    color: #1e293b;
}

.glass {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(0,0,0,0.05);
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
}

.bg-glow {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 1000px;
    height: 1000px;
    background: var(--accent);
    filter: blur(200px);
    opacity: 0.15;
    z-index: -1;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<!-- HOME BUTTON -->
<div style="position: fixed; top: 20px; right: 20px; z-index: 100;">
    <a href="index.html" class="glass px-6 py-3 rounded-full font-bold text-sm flex items-center gap-2 text-slate-700 hover:scale-105 transition">
        <i class="fas fa-home"></i> Home
    </a>
</div>

<!-- HEADER -->
<header class="p-8 flex justify-between items-center max-w-7xl mx-auto">
    <div class="flex items-center gap-3">
        <img src="https://raw.githubusercontent.com/selvakalanchiam/ikass.in/main/logoikass.png" class="w-10 h-10">
        <div class="text-3xl font-black tracking-tighter">
            IKASS<span style="color:#f97316;">.in</span>
        </div>
    </div>
</header>

<!-- MAIN -->
<main class="max-w-6xl mx-auto py-10">

    <!-- TITLE -->
    <h2 class="text-center text-[20px] font-black uppercase tracking-[0.5em] mb-16 text-slate-400">
        Hattrick Lab Leadership
    </h2>

    <!-- LEADER 1 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-16 items-center px-4 mb-24">

        <!-- IMAGE -->
        <div class="flex justify-center order-2 md:order-1">
            <img src="https://raw.githubusercontent.com/selvakalanchiam/ikass.in/main/Karthick.png"
                 class="w-64 h-64 md:w-[480px] md:h-[480px] rounded-[3rem] border-[10px] border-white shadow-2xl object-cover">
        </div>

        <!-- TEXT -->
        <div class="text-center md:text-left order-1 md:order-2">
            <span class="text-[20px] font-black uppercase tracking-[0.5em] mb-4 block text-orange-500">
                Co-Founder & Managing Director
            </span>

            <h1 class="text-4xl sm:text-5xl lg:text-7xl font-black mb-6 tracking-tighter">
                Karthick
            </h1>

            <p class="text-lg md:text-xl text-slate-500 max-w-lg leading-relaxed font-light">
                Former KMC Hospital technician. Expert in customer-centric diagnostics and home collection services.
            </p>
        </div>

    </div>

    <!-- LEADER 2 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-16 items-center px-4">

        <!-- TEXT -->
        <div class="text-center md:text-left order-1 md:order-1">
            <span class="text-[20px] font-black uppercase tracking-[0.5em] mb-4 block text-orange-500">
                Co-Founder & Accountant
            </span>

            <h1 class="text-4xl sm:text-5xl lg:text-7xl font-black mb-6 tracking-tighter">
                Eswar
            </h1>

            <p class="text-lg md:text-xl text-slate-500 max-w-lg leading-relaxed font-light">
                Managing the financial backbone and operational precision of Hattrick Lab.
            </p>
        </div>

        <!-- IMAGE -->
        <div class="flex justify-center order-2 md:order-2">
            <img src="https://raw.githubusercontent.com/selvakalanchiam/ikass.in/main/eswar.png"
                 class="w-64 h-64 md:w-[480px] md:h-[480px] rounded-[3rem] border-[10px] border-white shadow-2xl object-cover">
        </div>

    </div>

</main>

</body>
</html>
