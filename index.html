<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKASS | Software & Virtual Staging</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .aspect-16-9 { aspect-ratio: 16 / 9; }
    </style>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen p-4">
    <div class="max-w-4xl w-full border border-slate-700 rounded-xl overflow-hidden shadow-2xl bg-slate-800">
        <div class="aspect-16-9 bg-gradient-to-br from-blue-600 to-purple-700 flex flex-col items-center justify-center p-8 text-center">
            <h1 class="text-5xl font-bold mb-4 tracking-tight">IKASS.IN</h1>
            <p class="text-xl text-blue-100 max-w-lg">Professional Software Development & Virtual Staging Solutions.</p>
        </div>
        
        <div class="p-8 text-center">
            <div class="inline-block px-3 py-1 rounded-full bg-blue-500/20 text-blue-400 text-sm font-medium mb-4">
                Site Under Development
            </div>
            <p class="text-slate-400 mb-6">We are currently building something amazing for IKASS PC Solution and Ikass Media.</p>
            <div class="flex justify-center gap-4">
                <div class="h-2 w-2 bg-blue-500 rounded-full animate-bounce"></div>
                <div class="h-2 w-2 bg-blue-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                <div class="h-2 w-2 bg-blue-500 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
            </div>
        </div>
    </div>
</body>
</html>
